<div id="ticket-section">
    <div id="ticket-display">
        {% if task.ticket_id %}
        <div class="ticket-line">
            <span class="sec-label">TICKET</span>
            <span class="ticket-id">{{ task.ticket_id }}</span>
            {% if task.ticket_url %}
            <a href="{{ task.ticket_url }}" target="_blank" class="ticket-url">🔗 Open</a>
            {% endif %}
            <button class="sec-action" onclick="toggleTicketEdit()">✏️</button>
        </div>
        {% else %}
        <div class="ticket-line">
            <span class="sec-label">TICKET</span>
            <span class="text-muted">No ticket linked.</span>
            <button class="sec-action" onclick="toggleTicketEdit()">✏️</button>
        </div>
        {% endif %}
    </div>
    <form id="ticket-edit-form" style="display: none; margin-top: 8px;" hx-post="/api/ticket" hx-swap="none">
        <input type="text" name="ticket_id" placeholder="Ticket ID (e.g., PROJ-123)"
            value="{{ task.ticket_id or '' }}" required>
        <input type="text" name="ticket_url" placeholder="Ticket URL (optional)"
            value="{{ task.ticket_url or '' }}">
        <div class="form-actions">
            <button type="submit" class="btn-primary">Save</button>
            <button type="button" class="btn-secondary" onclick="toggleTicketEdit()">Cancel</button>
        </div>
    </form>
</div>
