<div id="repos-section" hx-get="/partials/repos" hx-trigger="sse:repos" hx-swap="outerHTML">
    <div class="sec-head">
        <span class="sec-label">REPOSITORIES</span>
    </div>
    {% if repos and repos|length > 0 %}
    <div class="repo-list">
        {% for repo in repos %}
        <div class="repo-item">
            <span>📁</span>
            <span class="repo-path" title="{{ repo.repo_path }}">{{ repo.repo_path }}</span>
            {% if repo.base_branch %}
            <span class="branch-pill">{{ repo.base_branch }}</span>
            {% endif %}
        </div>
        {% endfor %}
    </div>
    {% else %}
    <div class="text-muted" style="font-size: 12px;">No repositories registered.</div>
    {% endif %}
</div>
