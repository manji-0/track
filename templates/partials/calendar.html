{% if calendar_id %}
<div id="calendar-section">
    <div class="sec-head">
        <span class="sec-label">📅 TODAY'S SCHEDULE</span>
    </div>
    <div class="calendar-container" id="calendar-wrapper">
        <iframe id="calendar-iframe"
            src="https://calendar.google.com/calendar/embed?src={{ calendar_id }}&mode=AGENDA&showTitle=0&showNav=0&showDate=0&showPrint=0&showTabs=0&showCalendars=0&showTz=0&height=400&wkst=1&ctz=Asia%2FTokyo"
            frameborder="0" scrolling="no"></iframe>
    </div>
</div>
{% else %}
<div id="calendar-section">
    <div class="sec-head">
        <span class="sec-label">📅 CALENDAR</span>
    </div>
    <p class="text-muted" style="font-size: 12px;">
        No calendar configured. Run <code>track config set-calendar &lt;calendar-id&gt;</code> to set up.
    </p>
</div>
{% endif %}
