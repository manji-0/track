<div id="links-section">
    <div class="sec-head">
        <span class="sec-label">LINKS</span>
    </div>

    {% if links and links|length > 0 %}
    <div class="link-list">
        {% for link in links %}
        <div class="link-item">
            <span>🔗</span>
            <a href="{{ link.url }}" target="_blank" class="link-url">{{ link.title or link.url }}</a>
            <button class="btn-delete" hx-delete="/api/link/{{ link.link_id }}" hx-swap="none"
                hx-confirm="Delete this link?" title="Delete link">✕</button>
        </div>
        {% endfor %}
    </div>
    {% else %}
    <div class="text-muted" style="font-size: 12px;">No links yet.</div>
    {% endif %}

    <!-- Add Link Form -->
    <form class="link-add" hx-post="/api/link" hx-swap="none" hx-on::after-request="this.reset()">
        <input type="text" name="url" placeholder="URL" required autocomplete="off" style="flex: 1.5;">
        <input type="text" name="title" placeholder="Title (optional)" autocomplete="off">
        <button type="submit" class="btn-secondary">+ Add</button>
    </form>
</div>
