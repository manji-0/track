<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Track WebUI{% endblock %}</title>
    <meta name="description" content="Track - Task and TODO Management">
    <link rel="icon" href="/static/favicon.ico" sizes="any">

    <style>
        :root {
            --accent: #4f7cff;
            --bg: #101116;
            --rail: #0c0d11;
            --panel: #15161c;
            --panel-2: #191a21;
            --border: rgba(255, 255, 255, .07);
            --border-2: rgba(255, 255, 255, .12);
            --text: #e6e7eb;
            --text-2: #c6c8d1;
            --sub: #8a8d98;
            --muted: #5d6069;
            --green: #4cc38a;
            --red: #e5646c;
            --code-bg: rgba(255, 255, 255, .07);
            --shadow: 0 8px 24px rgba(0, 0, 0, .4);
            --mono: ui-monospace, 'SF Mono', Menlo, monospace;
        }

        [data-theme="light"] {
            --bg: #f7f7f8;
            --rail: #f2f2f4;
            --panel: #ffffff;
            --panel-2: #ffffff;
            --border: rgba(0, 0, 0, .08);
            --border-2: rgba(0, 0, 0, .14);
            --text: #1b1c20;
            --text-2: #3c3d43;
            --sub: #6e7076;
            --muted: #9a9ca3;
            --green: #2f9e63;
            --red: #d64550;
            --code-bg: rgba(0, 0, 0, .06);
            --shadow: 0 8px 24px rgba(0, 0, 0, .12);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body { height: 100%; overscroll-behavior: none; }

        body {
            font-family: -apple-system, 'SF Pro Text', BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-size: 13px;
            line-height: 1.5;
            background: var(--bg);
            color: var(--text);
        }

        a { color: var(--accent); text-decoration: none; }
        a:hover { text-decoration: underline; }

        input, textarea, button { font: inherit; color: inherit; }

        input[type="text"], textarea {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 7px 10px;
            color: var(--text);
        }

        input:focus, textarea:focus { outline: 1.5px solid var(--accent); outline-offset: -1px; }

        ::placeholder { color: var(--muted); }

        code {
            font-family: var(--mono);
            font-size: .92em;
            background: var(--code-bg);
            padding: 1px 5px;
            border-radius: 4px;
        }

        /* ===== App shell ===== */
        .app { height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* ===== Topbar ===== */
        .topbar {
            display: flex; align-items: center; gap: 12px;
            height: 52px; padding: 0 20px;
            border-bottom: 1px solid var(--border); flex: none;
        }

        .brand {
            width: 20px; height: 20px; border-radius: 6px;
            background: var(--accent);
            color: #fff; font-size: 10px; font-weight: 600;
            display: flex; align-items: center; justify-content: center;
        }

        .task-title { font-weight: 600; font-size: 14px; }
        .task-alias { color: var(--muted); font-size: 12px; }

        .ticket-badge {
            font-family: var(--mono); font-size: 11px; padding: 2px 8px; border-radius: 99px;
            background: color-mix(in oklab, var(--accent) 14%, transparent);
            color: var(--accent);
        }

        .task-id { color: var(--muted); font-size: 12px; }

        .chip {
            cursor: pointer; font-size: 11.5px; padding: 3px 10px; border-radius: 99px;
            border: 1px solid var(--border); background: transparent; color: var(--sub);
        }

        .chip:hover { border-color: var(--border-2); color: var(--text-2); }

        .chip.active {
            border-color: color-mix(in oklab, var(--accent) 50%, transparent);
            background: color-mix(in oklab, var(--accent) 12%, transparent);
            color: var(--text);
        }

        .spacer { flex: 1; }

        .connection-status { display: flex; align-items: center; gap: 6px; font-size: 11.5px; color: var(--sub); }
        .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--red); }
        .connection-status.connected .status-dot { background: var(--green); }

        .icon-btn {
            cursor: pointer; width: 28px; height: 28px; border-radius: 6px;
            border: 1px solid var(--border); background: transparent;
            display: flex; align-items: center; justify-content: center; font-size: 13px;
        }

        .icon-btn:hover { border-color: var(--border-2); }

        /* ===== Context drawer ===== */
        .drawer {
            display: grid; grid-template-columns: 1.3fr 1fr 1fr; gap: 24px;
            padding: 16px 20px; background: var(--rail);
            border-bottom: 1px solid var(--border); flex: none;
        }

        .drawer[hidden] { display: none; }

        .sec-head { display: flex; align-items: center; margin-bottom: 6px; }
        .sec-label { font-size: 11px; font-weight: 600; letter-spacing: .06em; color: var(--muted); }
        .sec-action {
            margin-left: auto; font-size: 11px; color: var(--accent);
            background: none; border: none; cursor: pointer; padding: 0;
        }

        .description { color: var(--sub); font-size: 12.5px; white-space: pre-wrap; }
        .text-muted { color: var(--muted); }

        .ticket-line { display: flex; align-items: center; gap: 8px; margin-top: 12px; }
        .ticket-line .ticket-id { font-family: var(--mono); font-size: 11.5px; color: var(--accent); }
        .ticket-line .ticket-url { font-size: 11px; color: var(--sub); }

        .repo-item { display: flex; align-items: center; gap: 7px; font-size: 12px; padding: 2.5px 0; }
        .repo-path { font-family: var(--mono); color: var(--text-2); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .branch-pill {
            margin-left: auto; flex: none; font-size: 10.5px; padding: 1px 7px; border-radius: 99px;
            background: var(--code-bg); color: var(--sub);
        }

        .link-item { display: flex; align-items: center; gap: 7px; font-size: 12px; padding: 2.5px 0; }
        .link-item .btn-delete { margin-left: auto; }
        .link-add { display: flex; gap: 6px; margin-top: 8px; }
        .link-add input { flex: 1; font-size: 11.5px; padding: 5px 8px; border-radius: 6px; }

        .btn-delete {
            cursor: pointer; background: none; border: none; color: var(--muted);
            font-size: 11px; padding: 0 2px;
        }
        .btn-delete:hover { color: var(--red); }

        /* ===== Body grid ===== */
        .body-grid { display: grid; grid-template-columns: 360px 1fr; flex: 1; min-height: 0; }

        /* ===== TODO rail ===== */
        .todo-rail {
            border-right: 1px solid var(--border); background: var(--rail);
            display: flex; flex-direction: column; min-height: 0;
        }

        #todos-section { display: flex; flex-direction: column; flex: 1; min-height: 0; }

        .rail-header { display: flex; align-items: center; gap: 8px; padding: 14px 16px 10px; flex: none; }
        .rail-title { font-weight: 600; font-size: 12.5px; }
        .rail-count { margin-left: auto; font-size: 11px; color: var(--muted); }
        .rail-actions { display: flex; align-items: center; gap: 10px; flex: none; }
        .rail-header:not(:has(.rail-count)) .rail-actions { margin-left: auto; }
        .rail-header .sec-action { margin-left: 0; }

        .todo-scroll {
            flex: 1; overflow-y: auto; min-height: 0;
            padding: 0 10px 12px; display: flex; flex-direction: column; gap: 2px;
            scrollbar-width: thin;
        }

        .todo-item { border-radius: 8px; padding: 9px 10px; border: 1px solid transparent; }

        .todo-item.in-progress {
            background: color-mix(in oklab, var(--accent) 12%, transparent);
            border-color: color-mix(in oklab, var(--accent) 35%, transparent);
        }

        .todo-row { display: flex; gap: 8px; align-items: flex-start; }
        .todo-idx { flex: none; font-family: var(--mono); font-size: 10.5px; color: var(--muted); padding-top: 2px; }
        .todo-item.in-progress .todo-idx { color: var(--accent); }
        .todo-body { flex: 1; min-width: 0; font-size: 12.5px; color: var(--text-2); }
        .todo-item.in-progress .todo-body { font-weight: 500; color: var(--text); }
        .todo-body a { pointer-events: auto; }

        .worktree-path {
            margin-top: 3px; font-family: var(--mono); font-size: 10.5px; color: var(--sub);
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }

        .todo-actions { display: flex; gap: 4px; flex: none; opacity: 0; transition: opacity .12s; }
        .todo-item:hover .todo-actions,
        .todo-item:focus-within .todo-actions { opacity: 1; }

        @media (hover: none) {
            .todo-actions { opacity: 1; }
        }

        .act-btn {
            cursor: pointer; width: 22px; height: 22px; border-radius: 5px;
            border: 1px solid var(--border); background: var(--bg); color: var(--sub);
            font-size: 10px; display: flex; align-items: center; justify-content: center;
        }
        .act-btn:hover { border-color: var(--border-2); color: var(--text); }
        .act-btn.done { color: var(--green); }
        .act-btn.delete:hover { color: var(--red); }

        .btn-scrap-link {
            cursor: pointer; background: none; border: none; font-size: 11px; padding: 0 2px; flex: none;
        }

        .closed-toggle {
            cursor: pointer; margin: 10px 6px 0; border: none; background: transparent;
            border-top: 1px solid var(--border); padding: 10px 0 4px;
            font-size: 11px; color: var(--muted); display: flex; align-items: center; gap: 6px;
            text-align: left; width: calc(100% - 12px);
        }

        .todo-item.closed { opacity: .5; padding: 6px 10px; }
        .todo-item.closed .todo-body { text-decoration: line-through; color: var(--sub); font-size: 12px; }
        .status-dot-sm { flex: none; width: 8px; height: 8px; border-radius: 50%; margin-top: 5px; }
        .status-dot-sm.done { background: var(--green); }
        .status-dot-sm.cancelled { background: var(--red); }

        /* ===== Workflow footer ===== */
        .workflow-footer { flex: none; padding: 14px 16px; border-top: 1px solid var(--border); }
        .workflow-head { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
        .phase-badge {
            font-size: 10px; font-weight: 600; letter-spacing: .05em; text-transform: uppercase;
            padding: 1px 7px; border-radius: 99px;
            background: color-mix(in oklab, var(--green) 15%, transparent); color: var(--green);
        }
        .workflow-label { font-size: 11px; color: var(--muted); }
        .workflow-command {
            display: block; font-family: var(--mono); font-size: 11.5px; color: var(--text-2);
            background: var(--panel); border: 1px solid var(--border); border-radius: 6px;
            padding: 6px 9px; word-break: break-all;
        }
        .workflow-reason { color: var(--sub); font-size: 11.5px; margin-top: 5px; }
        .workflow-checklist { list-style: none; margin-top: 8px; }
        .workflow-step { display: flex; flex-wrap: wrap; gap: 7px; font-size: 11.5px; color: var(--sub); padding: 2px 0; }
        .workflow-step.done { color: var(--text-2); }
        .workflow-step .step-marker { color: var(--muted); }
        .workflow-step.done .step-marker { color: var(--green); }
        .step-command {
            flex: 1 1 100%; margin-left: 15px; font-family: var(--mono); font-size: 10.5px;
            color: var(--muted); word-break: break-all;
        }

        /* ===== Stream (scraps) ===== */
        .stream-col { display: flex; flex-direction: column; min-height: 0; }

        .stream {
            flex: 1; overflow-y: auto; min-height: 0; padding: 20px 28px;
            scrollbar-width: thin;
        }

        .day-label { font-size: 11px; font-weight: 600; letter-spacing: .06em; color: var(--muted); margin-bottom: 14px; }

        .stream-row { display: grid; grid-template-columns: 92px 20px 1fr; gap: 0 12px; padding-bottom: 18px; }
        .stream-time {
            font-family: var(--mono); font-size: 10.5px; color: var(--muted);
            text-align: right; padding-top: 3px; white-space: nowrap;
        }
        .stream-line { display: flex; flex-direction: column; align-items: center; }
        .stream-dot {
            width: 8px; height: 8px; border-radius: 50%; margin-top: 6px; flex: none;
            background: var(--panel-2); border: 1.5px solid var(--muted);
        }
        .stream-tail { flex: 1; width: 1px; background: var(--border); margin-top: 4px; }

        .scrap-card {
            background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
            padding: 10px 14px; font-size: 12.5px; color: var(--text-2); min-width: 0;
        }

        .scrap-highlighted {
            border-color: var(--accent);
            background: color-mix(in oklab, var(--accent) 8%, transparent);
        }

        .todo-ref {
            display: inline-block; font-size: 10px; color: var(--accent);
            background: color-mix(in oklab, var(--accent) 14%, transparent);
            padding: 1px 6px; border-radius: 99px; margin-left: 6px;
        }

        .scrap-markdown p { margin: 0 0 .4em; }
        .scrap-markdown p:last-child { margin-bottom: 0; }
        .scrap-markdown pre {
            background: var(--code-bg); border-radius: 6px; padding: 8px 10px;
            overflow-x: auto; margin: .4em 0;
        }
        .scrap-markdown pre code { background: none; padding: 0; }
        .scrap-markdown ul, .scrap-markdown ol { padding-left: 1.2em; }

        /* ===== Command bar ===== */
        .cmd-bar { flex: none; padding: 16px 28px 20px; }
        .cmd-box {
            display: flex; align-items: center; gap: 10px;
            background: var(--panel-2); border: 1px solid var(--border-2); border-radius: 12px;
            padding: 6px 16px; box-shadow: var(--shadow);
        }
        .cmd-box:focus-within { border-color: color-mix(in oklab, var(--accent) 50%, transparent); }
        .cmd-prompt { color: var(--accent); font-family: var(--mono); font-weight: 600; }
        .cmd-input {
            flex: 1; background: transparent; border: none; outline: none;
            font-size: 13px; padding: 8px 0; color: var(--text); resize: none;
            max-height: 120px;
        }
        .cmd-input:focus { outline: none; }
        .kbd {
            font-size: 10.5px; color: var(--muted); border: 1px solid var(--border-2);
            border-radius: 4px; padding: 1px 6px; font-family: var(--mono);
        }

        /* ===== Forms / buttons ===== */
        .form-actions { display: flex; gap: 6px; margin-top: 8px; }
        .btn-primary, .btn-secondary {
            cursor: pointer; font-size: 12px; font-weight: 600; border-radius: 6px; padding: 5px 12px;
        }
        .btn-primary { background: var(--accent); color: #fff; border: 1px solid transparent; }
        .btn-primary:hover { filter: brightness(1.1); }
        .btn-secondary { background: transparent; color: var(--sub); border: 1px solid var(--border); }
        .btn-secondary:hover { border-color: var(--border-2); color: var(--text); }

        #desc-edit-form textarea, #ticket-edit-form input { width: 100%; font-size: 12.5px; }
        #ticket-edit-form input { margin-bottom: 6px; }

        /* ===== Empty / no-task states ===== */
        .empty-state { text-align: center; color: var(--muted); padding: 2rem 1rem; font-size: 12.5px; }
        .empty-state .icon { font-size: 1.5rem; margin-bottom: .25rem; }

        .no-task {
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: .5rem; color: var(--sub); text-align: center; padding: 2rem;
        }
        .no-task .icon { font-size: 2.5rem; }
        .no-task h2 { color: var(--text); font-size: 1.1rem; }

        /* ===== Calendar ===== */
        .calendar-container iframe { border: 0; width: 100%; height: 420px; border-radius: 8px; }

        @media (max-width: 900px) {
            .drawer { grid-template-columns: 1fr; gap: 16px; }
            .body-grid { grid-template-columns: 1fr; grid-template-rows: auto 1fr; }
            .todo-rail { border-right: none; border-bottom: 1px solid var(--border); max-height: 45vh; }
        }
    </style>

    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
</head>

<body>
    {% block content %}{% endblock %}

    <script>
        // Theme management
        (function () {
            const html = document.documentElement;
            const themeToggle = document.getElementById('theme-toggle');
            const themeIcon = document.getElementById('theme-icon');
            const savedTheme = localStorage.getItem('theme') || 'dark';

            function applyTheme(theme) {
                if (theme === 'light') {
                    html.setAttribute('data-theme', 'light');
                    if (themeIcon) themeIcon.textContent = '☀️';
                } else {
                    html.removeAttribute('data-theme');
                    if (themeIcon) themeIcon.textContent = '🌙';
                }
                localStorage.setItem('theme', theme);
            }

            applyTheme(savedTheme);

            if (themeToggle) {
                themeToggle.addEventListener('click', function () {
                    const currentTheme = html.getAttribute('data-theme');
                    applyTheme(currentTheme === 'light' ? 'dark' : 'light');
                });
            }
        })();
    </script>

    <script>
        // Context drawer toggle (persisted)
        window.toggleDrawer = function () {
            const drawer = document.getElementById('context-drawer');
            const chip = document.getElementById('drawer-chip');
            if (!drawer) return;
            const open = drawer.hidden;
            drawer.hidden = !open;
            if (chip) {
                chip.classList.toggle('active', open);
                chip.setAttribute('aria-expanded', open ? 'true' : 'false');
                const chev = chip.querySelector('.chev');
                if (chev) chev.textContent = open ? '⌃' : '⌄';
            }
            localStorage.setItem('drawerOpen', open ? '1' : '0');
        };

        (function () {
            const drawer = document.getElementById('context-drawer');
            const chip = document.getElementById('drawer-chip');
            if (!drawer) return;
            const open = localStorage.getItem('drawerOpen') === '1';
            drawer.hidden = !open;
            if (chip) {
                chip.classList.toggle('active', open);
                chip.setAttribute('aria-expanded', open ? 'true' : 'false');
                const chev = chip.querySelector('.chev');
                if (chev) chev.textContent = open ? '⌃' : '⌄';
            }
        })();
    </script>

    <script>
        // SSE connection for real-time updates
        if (!window.sseInitialized) {
            window.sseInitialized = true;
            window.eventSource = null;
            window.reconnectAttempts = 0;
            const maxReconnectAttempts = 5;

            window.connectSSE = function () {
                if (window.eventSource) {
                    window.eventSource.close();
                    window.eventSource = null;
                }

                window.eventSource = new EventSource('/api/sse');

                window.eventSource.onopen = function () {
                    window.reconnectAttempts = 0;
                    const status = document.getElementById('connection-status');
                    if (status) {
                        status.className = 'connection-status connected';
                        const textEl = status.querySelector('.status-text');
                        if (textEl) textEl.textContent = 'Live';
                    }
                };

                window.eventSource.addEventListener('update', function (e) {
                    const event = JSON.parse(e.data);
                    switch (event.type) {
                        case 'header':
                            window.location.reload();
                            break;
                        case 'description':
                            htmx.ajax('GET', '/api/card/description', { target: '#description-section', swap: 'outerHTML' });
                            break;
                        case 'ticket':
                            htmx.ajax('GET', '/api/card/ticket', { target: '#ticket-section', swap: 'outerHTML' });
                            break;
                        case 'links':
                            htmx.ajax('GET', '/api/card/links', { target: '#links-section', swap: 'outerHTML' });
                            break;
                        case 'todos':
                            htmx.ajax('GET', '/api/card/todos', { target: '#todos-section', swap: 'outerHTML' });
                            break;
                        case 'scraps':
                            htmx.ajax('GET', '/api/card/scraps', { target: '#scraps-section', swap: 'outerHTML' });
                            break;
                        case 'repos':
                            htmx.ajax('GET', '/partials/repos', { target: '#repos-section', swap: 'outerHTML' });
                            break;
                        default:
                            console.warn('Unknown SSE event type:', event.type);
                    }
                });

                window.eventSource.onerror = function () {
                    const status = document.getElementById('connection-status');
                    if (status) {
                        status.className = 'connection-status disconnected';
                        const textEl = status.querySelector('.status-text');
                        if (textEl) textEl.textContent = 'Offline';
                    }
                    if (window.eventSource) {
                        window.eventSource.close();
                        window.eventSource = null;
                    }
                    if (window.reconnectAttempts < maxReconnectAttempts) {
                        window.reconnectAttempts++;
                        setTimeout(window.connectSSE, 2000 * window.reconnectAttempts);
                    }
                };
            };

            window.connectSSE();

            document.addEventListener('visibilitychange', function () {
                if (!document.hidden && (!window.eventSource || window.eventSource.readyState === EventSource.CLOSED)) {
                    window.reconnectAttempts = 0;
                    window.connectSSE();
                }
            });
        }
    </script>

    <script>
        // Inline edit toggles (description / ticket in the context drawer)
        window.toggleDescEdit = function () {
            const display = document.getElementById('desc-display');
            const form = document.getElementById('desc-edit-form');
            if (form && form.style.display === 'none') {
                if (display) display.style.display = 'none';
                form.style.display = 'block';
                const textarea = form.querySelector('textarea');
                if (textarea) textarea.focus();
            } else if (form) {
                if (display) display.style.display = 'block';
                form.style.display = 'none';
            }
        };

        window.toggleTicketEdit = function () {
            const display = document.getElementById('ticket-display');
            const form = document.getElementById('ticket-edit-form');
            if (form && form.style.display === 'none') {
                if (display) display.style.display = 'none';
                form.style.display = 'block';
                const input = form.querySelector('input[name="ticket_id"]');
                if (input) input.focus();
            } else if (form) {
                if (display) display.style.display = 'block';
                form.style.display = 'none';
            }
        };
    </script>
</body>

</html>
